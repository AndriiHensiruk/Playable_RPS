<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playable RPS</title>
  <style>
    body, html {
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      background: #111; 
      overflow: hidden; 
      font-family: 'Arial Rounded MT Bold', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    #gameContainer {
      position: relative; 
      height: 100%; 
      aspect-ratio: 9/16; 
      max-width: 100%;
      max-height: 100vh;
      overflow: hidden; 
      background: #000 url('assets/video_bg.webp') center center / cover no-repeat;
      box-shadow: 0 0 30px rgba(0,0,0,0.8); 
    }
    
    /* Обидва відео-шари тепер повноцінні й кросфейдяться між собою */
    #bgVideo, #nextVideoCache {
      position:absolute; top:0; left:0; width:100%; height:100%;
      object-fit:cover;
      transition: filter 0.3s ease, opacity 0.4s ease;
    }
    #bgVideo { z-index: 2; opacity: 1; }
    #nextVideoCache { z-index: 1; opacity: 0; pointer-events: none; }

    video.paused-dark {filter: brightness(0.7) contrast(0.95);}
    video.playing-dark {filter: brightness(0.3) contrast(0.95);}

    /* Початковий екран */
    #splash {position:absolute; top:0; left:0; width:100%; height:100%; display:flex; justify-content:center; align-items:center; flex-direction:column; z-index:10;}
    #splashVideo {filter: blur(4px) brightness(0.7); scale: 1.5; width:100%; height:100%; object-fit:cover; position:absolute; top:20%; left:0; z-index:-1;}
    #splashTitle {position:absolute; top:25%; left:50%; transform:translateX(-50%); width:80%; max-width: 340px;}
    
    #startBtn {
      position:absolute; top:55%; left:50%; transform:translate(-50%, -50%); 
      width:65%; max-width: 260px; cursor:pointer; 
      filter: drop-shadow(0 4px 15px rgba(0,0,0,0.5));
      animation: btnPulseConnection 2s infinite ease-in-out;
    }
    
    #handPointer {
      position:absolute; top:56%; left:56%; width:32%; max-width: 50%; 
      pointer-events: none; z-index: 11;
      animation: clickHandPhysics 2s infinite ease-in-out;
    }
    
    @keyframes clickHandPhysics {
      0%, 100% { transform: translate(0, 0) scale(1); }
      40% { transform: translate(-20px, -15px) scale(1.1); }
      55% { transform: translate(4px, 12px) scale(0.85); }
    }

    @keyframes btnPulseConnection {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      55% { transform: translate(-50%, -50%) scale(0.94); }
      70% { transform: translate(-50%, -50%) scale(1); }
    }
    
    /* Ігровий інтерфейс */
    #overlay {
      position:absolute; top:0; left:0; width:100%; height:100%; 
      display:none; flex-direction:column; justify-content:space-between; align-items:center; 
      z-index:5; box-sizing: border-box; padding: 20px;
      opacity: 0; transition: opacity 0.3s ease;
    }
    #overlay.active { display: flex; opacity: 1; }

    .hands {position: absolute; top: 0; left: 0; width: 100%; height: 75%; pointer-events: none;}
    .hand {position: absolute; width:35%; max-width: 180px; opacity:0; transform-origin: center center;}
    
    #handPlayer {bottom: 1%; right: 5%; transform: scale(1) rotate(-20deg);}
    #handPlayer.paper-size {
      transform: scale(0.85) rotate(-20deg) !important;
    }
    #handOpponent {top: 1%; left: 5%; transform: scale(1) rotate(160deg);}
    
    .hand.shakePlayer {
      opacity: 1;
      animation: shakeP 0.5s ease-in-out 3;
    }
    .hand.shakeOpponent {
      opacity: 1;
      animation: shakeOpp 0.5s ease-in-out 3;
    }

    @keyframes shakeP {
      0%, 100% { transform: scale(1) rotate(-20deg) translateY(0); }
      50% { transform: scale(1.1) rotate(-10deg) translateY(-40px); }
    }
    @keyframes shakeOpp {
      0%, 100% { transform: scale(1) rotate(160deg) translateY(0); }
      50% { transform: scale(1.1) rotate(150deg) translateY(40px); }
    }

    #handPlayer.fadeIn { opacity:1; transform: scale(1) rotate(-20deg); filter: drop-shadow(0 0 15px rgba(255,255,255,0.6)); transition: all 0.2s ease-out; }
    #handOpponent.fadeIn { opacity:1; transform: scale(1) rotate(160deg); filter: drop-shadow(0 0 15px rgba(255,255,255,0.6)); transition: all 0.2s ease-out; }
    
    #result {
      position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.1);
      width: 40%; max-width: 280px; opacity: 0; z-index: 6;
      pointer-events: none;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #result.show {opacity: 1; transform: translate(-50%, -50%) scale(1);}

    /* Кнопки вибору */
    .choices {display:flex; gap:4%; width: 90%; justify-content: center; position: absolute; bottom: 5%; left: 5%; z-index: 7;}
    .choices img {
      width:28%; max-width: 110px; cursor:pointer; 
      border: none; border-radius: 18px; box-shadow: 0 8px 16px rgba(0,0,0,0.4);
      box-sizing: border-box; padding: 5px;
      opacity: 0; transform: scale(0);
      transition: opacity 0.3s, transform 0.3s, box-shadow 0.3s;
    }
    
    .choices img.scale-in { opacity: 1; transform: scale(1); }

    .choices img.idle-glow {
      animation: pulseShadowOnly 1.5s infinite ease-in-out;
    }
    @keyframes pulseShadowOnly {
      0% { box-shadow: 0 8px 16px rgba(0,0,0,0.4); transform: scale(1); }
      50% { box-shadow: 0 12px 24px rgba(255,255,255,0.4); transform: scale(1.05); }
      100% { box-shadow: 0 8px 16px rgba(0,0,0,0.4); transform: scale(1); }
    }

    .choices img.disabled {pointer-events: none; opacity: 0.3; transform: scale(0.9); filter: grayscale(0.5);}
    .choices img.selected {transform: scale(1.1); box-shadow: 0 0 25px rgba(0, 255, 34, 0.8); border: 3px solid #00ff22; opacity: 1;}

    #particles {position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index: 99 !important;}

    /* Фінальна сцена */
    #finalScene {position:absolute; top:0; left:0; width:100%; height:100%; display:none; z-index:30;}
    #finalScene video {position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover;}
    #finalScene img {position:absolute; opacity:0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
    #finalScene img.show {opacity:1; transform: scale(1);}
    
    #bubble { top:25%; width:50%; max-width: 240px; left: auto !important; right: 5%; transform: scale(0.7); }
    #ctaBtn { top:60%; left: 6%; transform: translateX(-50%) scale(0.7); width:100%; max-width: 380px; cursor:pointer; filter: drop-shadow(0 6px 20px rgba(0,0,0,0.6)); }
    #ctaBtn.show { transform: translateX(50%) scale(1.5); }

    #muteBtn {position:absolute; top:15px; right:15px; z-index:40; font-size:20px; cursor:pointer; background:rgba(255,255,255,0.8); border:none; border-radius:50%; width:40px; height:40px; display:flex; align-items:center; justify-content:center; box-shadow: 0 2px 5px rgba(0,0,0,0.2);}
  </style>
</head>
<body>

<div id="gameContainer">
  <div id="splash">
    <video id="splashVideo" muted loop playsinline preload="auto" src="assets/video1.webm"></video>
    <img src="assets/title.webp" id="splashTitle" alt="See what others don't">
    <img src="assets/start_btn.webp" id="startBtn" onclick="startGame()" alt="Tap to undress her">
    <img src="assets/hand_pointer.webp" id="handPointer" alt="Pointer">
  </div>

  <!-- Два повноцінних відео-шари для кросфейду -->
  <video id="bgVideo" muted playsinline></video>
  <video id="nextVideoCache" muted playsinline preload="auto"></video>

  <div id="overlay">
    <div class="hands">
      <img id="handPlayer" class="hand" src="assets/player_rock.webp" alt="Гравець">
      <img id="handOpponent" class="hand" src="assets/opp_rock.webp" alt="Суперник">
    </div>
    
    <img id="result" src="assets/win_text.png" alt="WIN">
    
    <div class="choices">
      <img id="choicePaper" src="assets/paper.webp" onclick="play('paper')" alt="Paper">
      <img id="choiceRock" src="assets/rock.webp" onclick="play('rock')" alt="Rock">
      <img id="choiceScissors" src="assets/scissors.webp" onclick="play('scissors')" alt="Scissors">
    </div>
  </div>

  <canvas id="particles"></canvas>

  <div id="finalScene">
    <video id="finalVideo" muted playsinline loop></video>
    <img id="bubble" src="assets/bubble.webp" alt="Finish what you started">
    <img id="ctaBtn" src="assets/button.webp" alt="See More" onclick="window.location.href='https://honeytoon.com/video-comic/ripe-peach?n=1'">
  </div>

  <button id="muteBtn" onclick="toggleSound()">🔊</button>
</div>

<audio id="bgMusic" src="assets/music.mp3" loop playsinline></audio>
<audio id="winSound" src="assets/win.mp3" playsinline></audio>
<audio id="winSound2" src="assets/win2.mp3" playsinline></audio>
<audio id="bubbleSound" src="assets/bubble.mp3" playsinline></audio>
<audio id="startSound" src="assets/start_sound.mp3" playsinline></audio>

<script>
let activeVideo = document.getElementById("bgVideo");
let standbyVideo = document.getElementById("nextVideoCache");

const bgMusic = document.getElementById("bgMusic");
const winSound = document.getElementById("winSound");
const winSound2 = document.getElementById("winSound2");
const bubbleSound = document.getElementById("bubbleSound");
const startSound = document.getElementById("startSound");

const playerGestures = { 
  rock: "assets/player_rock.webp", 
  paper: "assets/player_paper.webp", 
  scissors: "assets/player_scissors.webp" 
};

const opponentGestures = { 
  rock: "assets/opp_rock.webp", 
  paper: "assets/opp_paper.webp", 
  scissors: "assets/opp_scissors.webp" 
};

const choiceElements = ["choicePaper", "choiceRock", "choiceScissors"];
let gamePlaylist = []; 
let secondVideoType = ""; 
let round = 0;
let isMuted = false;
let particleAnimationId;
let glowInterval;
let currentGlowIndex = 0;

const CROSSFADE_MS = 400; 

window.addEventListener("DOMContentLoaded", () => {
  const splashVideo = document.getElementById("splashVideo");
  splashVideo.playbackRate = 0.5; 
  splashVideo.play().catch(e => console.log("Сплеш відео чекає взаємодії"));
});

function preparePlaylist() {
  const isVideo2 = Math.random() < 0.5;
  secondVideoType = isVideo2 ? "video2" : "video3";
  
  const randomSecondVideo = isVideo2 ? "assets/video2.webm" : "assets/video3.webm";
  gamePlaylist = [
    "assets/video1.webm",
    randomSecondVideo,
    "assets/video4.webm"
  ];
}

function startGame() {
  preparePlaylist();
  document.getElementById("splash").style.display = "none";
  activeVideo.style.display = "block";
  if (!isMuted) {
    bgMusic.play().catch(e => console.log("Аудіо заблоковано"));
    
    if (startSound) {
      startSound.currentTime = 0;
      startSound.play().catch(e => console.log("Стартовий звук заблоковано"));
    }
  }
  
  bgMusic.volume = 0.05;
  activeVideo.src = gamePlaylist[0];
  activeVideo.loop = true;
  activeVideo.play();
  preloadNextVideo(1); 
  
  setTimeout(() => { showOverlay(); }, 500);
}

function preloadNextVideo(nextRoundIndex) {
  if (nextRoundIndex < gamePlaylist.length) {
    standbyVideo.src = gamePlaylist[nextRoundIndex];
    standbyVideo.load();
  }
}

function crossfadeToStandby() {
  return new Promise(resolve => {
    if (!standbyVideo.src) { resolve(); return; }

    standbyVideo.className = "";
    standbyVideo.currentTime = 0;
    standbyVideo.loop = true;

    const doSwap = () => {
      standbyVideo.style.zIndex = 2;
      activeVideo.style.zIndex = 1;
      standbyVideo.style.opacity = 1;
      activeVideo.style.opacity = 0;

      setTimeout(() => {
        activeVideo.pause();
        const tmp = activeVideo;
        activeVideo = standbyVideo;
        standbyVideo = tmp;
        resolve();
      }, CROSSFADE_MS);
    };

    const playPromise = standbyVideo.play();
    if (playPromise !== undefined) {
      playPromise.then(doSwap).catch(() => doSwap());
    } else {
      doSwap();
    }
  });
}

function loadRound() {
  crossfadeToStandby().then(() => {
    activeVideo.className = "";
    preloadNextVideo(round + 1);

    if (round < 2) {
      setTimeout(() => {
        showOverlay();
      }, 300);
    }
  });
}

function showOverlay() {
  const overlay = document.getElementById("overlay");
  const player = document.getElementById("handPlayer");
  const opp = document.getElementById("handOpponent");
  
  player.className = "hand";
  opp.className = "hand";
  
  const buttons = choiceElements.map(id => document.getElementById(id));
  buttons.forEach(img => img.className = ""); 
  document.getElementById("result").classList.remove("show");
  
  overlay.style.display = "flex";
  setTimeout(() => overlay.classList.add("active"), 10);

  if (round === 0) {
    buttons.forEach((btn, index) => {
      setTimeout(() => {
        btn.classList.add("scale-in");
        if (index === buttons.length - 1) setTimeout(startIdleGlow, 300);
      }, index * 150);
    });
  } else {
    buttons.forEach(btn => btn.classList.add("scale-in"));
    setTimeout(startIdleGlow, 300);
  }
}

function startIdleGlow() {
  clearInterval(glowInterval);
  const buttons = choiceElements.map(id => document.getElementById(id));
  currentGlowIndex = 0;

  buttons[0].classList.add("idle-glow");

  glowInterval = setInterval(() => {
    buttons[currentGlowIndex].classList.remove("idle-glow");
    currentGlowIndex = (currentGlowIndex + 1) % buttons.length;
    buttons[currentGlowIndex].classList.add("idle-glow");
  }, 1500);
}

function play(choice) {
  clearInterval(glowInterval);
  
  const choicesImages = document.querySelectorAll('.choices img');
  const selected = document.getElementById(`choice${choice.charAt(0).toUpperCase() + choice.slice(1)}`);
  
  choicesImages.forEach(img => {
    img.classList.remove("idle-glow");
    img.className = (img === selected) ? "selected" : "disabled";
  });

  activeVideo.pause();
  activeVideo.className = "playing-dark";

  let opponent = "";
  if (choice === "paper") {
    opponent = "rock"; 
  } else if (choice === "scissors") {
    opponent = "paper"; 
  } else if (choice === "rock") {
    opponent = "scissors"; 
  }

  const player = document.getElementById("handPlayer");
  const opp = document.getElementById("handOpponent");

  player.src = playerGestures.rock;
  opp.src = opponentGestures.rock;
  
  player.className = "hand shakePlayer";
  opp.className = "hand shakeOpponent";

  setTimeout(() => {
    player.className = "hand fadeIn";
    opp.className = "hand fadeIn";
    if (choice === "paper") {
      player.classList.add("paper-size");
    }
    player.src = playerGestures[choice];
    opp.src = opponentGestures[opponent];

    setTimeout(() => {
      document.getElementById("result").classList.add("show");
      if (!isMuted) {
        if (round === 0) {
          winSound.currentTime = 0;
          winSound.play();
        } else {
          winSound2.currentTime = 0;
          winSound2.play(); 
          winSound2.volume = 1;
        }
      }
    }, 600); 

  }, 1500);

  setTimeout(() => {
    const overlay = document.getElementById("overlay");
    overlay.classList.remove("active");
    overlay.style.display = "none";
    
    activeVideo.className = "";
    activeVideo.loop = true;
    activeVideo.play();
    
    let targetYFactor = 0.5; 
    if (round === 1) {
      if (secondVideoType === "video2") {
        targetYFactor = 0.35; 
      } else if (secondVideoType === "video3") {
        targetYFactor = 0.65; 
      }
    }
    
    triggerHeartParticles(targetYFactor);

    setTimeout(() => {
      round++;
      if (round < 2) {
        loadRound(); 
      } else {
        showFinalScene(); 
      }
    }, 150); 

  }, 3200); 
}

function showFinalScene() {
  crossfadeToStandby().then(() => {
    const finalScene = document.getElementById("finalScene");
    const finalVideo = document.getElementById("finalVideo");

    finalVideo.src = gamePlaylist[2];
    finalScene.style.display = "flex";
    finalVideo.currentTime = activeVideo.currentTime || 0;
    finalVideo.play();

    activeVideo.style.display = "none";
    standbyVideo.style.display = "none";

    setTimeout(() => {
      document.getElementById("bubble").classList.add("show");
      document.getElementById("ctaBtn").classList.add("show");
      if (!isMuted && bubbleSound) {
        bubbleSound.currentTime = 0;
        bubbleSound.play().catch(e => console.log("Звук бабла заблоковано"));
      }
    }, 600);
  });
}

function triggerHeartParticles(yFactor) {
  const canvas = document.getElementById("particles");
  const ctx = canvas.getContext("2d");
  canvas.width = canvas.parentElement.clientWidth; 
  canvas.height = canvas.parentElement.clientHeight;

  let particles = [];
  const colors = ["#ff007f", "#ff409f", "#ff66b2", "#ff0055", "#ffb3d9"];
  
  for (let i = 0; i < 80; i++) {
    particles.push({
      x: canvas.width / 2 + (Math.random() * 120 - 60),
      y: canvas.height * yFactor, 
      dx: (Math.random() - 0.5) * 12,
      dy: (Math.random() * -7) - 6, 
      size: Math.random() * 20 + 16,
      color: colors[Math.floor(Math.random() * colors.length)],
      alpha: 1,
      rotation: (Math.random() - 0.5) * 0.8
    });
  }

  cancelAnimationFrame(particleAnimationId);

  function drawHeart(x, y, size, color, alpha, angle) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(0, -size / 4);
    ctx.bezierCurveTo(-size / 2, -size * 0.7, -size, -size / 3, 0, size);
    ctx.bezierCurveTo(size, -size / 3, size / 2, -size * 0.7, 0, -size / 4);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;

    particles.forEach(p => {
      if (p.alpha > 0.01) {
        alive = true;
        drawHeart(p.x, p.y, p.size, p.color, p.alpha, p.rotation);
        p.x += p.dx;
        p.y += p.dy;
        p.dy += 0.18; 
        p.alpha *= 0.96; 
        p.rotation += 0.02;
      }
    });

    if (alive) {
      particleAnimationId = requestAnimationFrame(animate);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }
  animate();
}

function toggleSound() {
  isMuted = !isMuted;
  bgMusic.muted = isMuted;
  winSound.muted = isMuted;
  winSound2.muted = isMuted;
  if (bubbleSound) bubbleSound.muted = isMuted;
  if (startSound) startSound.muted = isMuted;
  document.getElementById("muteBtn").textContent = isMuted ? "🔇" : "🔊";
}
</script>
</body>
</html>
